---

- name: Deploy nftables configurations
  ansible.builtin.copy:
    src: "./"
    dest: "/etc"
    owner: root
    group: root
    force: true
    directory_mode: '700'
    mode: '600'

- name: Enable and start nftables
  ansible.builtin.systemd_service:
    name: nftables
    state: started
    enabled: true

...
