---

- name: "Install ubicast webmonitor"
  notify: "Configure and restart munin-node"
  ansible.builtin.import_role:
    name: "nudgis/shared"
    tasks_from: "apt_install.yml"
  vars:
    apt_packages: "{{ monitor_packages + munin_server_packages }}"

- name: "Webmonitor online packages"
  when: not offline_mode
  ansible.builtin.import_role:
    name: "nudgis/shared"
    tasks_from: "apt_install.yml"
  vars:
    apt_packages: "{{ monitor_online_packages }}"

...
