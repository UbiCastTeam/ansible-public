---

- name: "Restart nginx"
  ansible.builtin.service:
    name: nginx
    state: restarted

- name: "Reload nginx"
  ansible.builtin.service:
    name: nginx
    state: reloaded

- name: "Restart skyreach"
  ansible.builtin.service:
    name: skyreach
    state: restarted

- ansible.builtin.import_tasks: ../../shared/handlers/nftables.yml

...
