---

# Packages required for the group. Comes from ubicast-skyreach-runtime packages
dependencies_packages:
  - cron
  - nginx
  - postfix
  - postgresql

# Packages required for the group
manager_packages:
  - ubicast-skyreach

# Packages to install only when the system is not in offline mode
manager_online_packages:
  - ubicast-web-access

# Group firewall rules filename, see roles/shared/files/nftables/
manager_firewall_rules_files:
  - http

...
