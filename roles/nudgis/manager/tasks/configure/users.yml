---

# At installation, admin user is created with an empty or random password
# See RM#40081 for details

- name: "Update admin password"  # noqa inline-env-var
  ansible.builtin.command:
    cmd: >
      ubicast-skyreach-ctl user update
        --target "username=admin"
        --password "{{ manager_user_admin_password }}"
    changed_when: false

...
