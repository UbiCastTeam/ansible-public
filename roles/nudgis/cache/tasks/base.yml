---

- name: "Ensure /etc/munin/plugin-conf.d/ directory exist"
  ansible.builtin.file:
    dest: /etc/munin/plugin-conf.d
    state: directory
    mode: "750"

- name: "Configure Nudgis Cache nginx monitoring plugin"
  ansible.builtin.copy:
    content: |
      [nginx_ubicast_multi]
      env.path_filters *.ts *.m3u8
    dest: /etc/munin/plugin-conf.d/nginx_ubicast_multi
    mode: "644"

- ansible.builtin.import_role:
    name: "nudgis/shared"
    tasks_from: "firewall_rules_files.yml"
  vars:
    firewall_rules_files: "{{ cache_firewall_rules_files }}"

- name: "Flush handlers"
  ansible.builtin.meta: flush_handlers

...
