---

- name: "Copy the firewall rule file"
  notify: "Reload nftables"
  ansible.builtin.copy:
    src: "../../shared/files/nftables/{{ item }}.nft"
    dest: "/etc/nftables.d/"
    owner: root
    group: root
    directory_mode: '700'
    mode: '600'
  register: files
  loop: '{{ firewall_rules_files }}'

...
