---

- name: "APT packages: {{ apt_packages | join(', ') }}"
  ansible.builtin.apt:
    name: "{{ apt_packages }}"
    force_apt_get: true
    update_cache: "{{ apt_update_cache | d(false) }}"
    install_recommends: "{{ apt_packages_install_recommends | d(false) }}"
    state: "{{ apt_packages_state | d('present') }}"
    purge: "{{ apt_packages_purge | d(false) }}"
  register: apt_status
  retries: 60
  until: apt_status is success or ('Failed to lock apt for exclusive operation' not in apt_status.msg and '/var/lib/dpkg/lock' not in apt_status.msg)

...
