---

- name: "Enable password login for ssh"
  notify: "Restart sshd"
  ansible.builtin.replace:
    dest: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication no'
    replace: '#PasswordAuthentication yes'

- name: "Enable mediaimport-cleanup timer"
  ansible.builtin.systemd:
    name: ubicast-mediaimport-cleanup.timer
    enabled: true

# FAIL2BAN

- name: "Deploy fail2ban pure-ftpd jail"
  notify: "Restart fail2ban"
  ansible.builtin.copy:
    dest: "/etc/fail2ban/jail.d/pure-ftpd.local"
    mode: "0644"
    content: |
      [pure-ftpd]
      enabled = true
      backend = systemd

- name: "Flush handlers"
  ansible.builtin.meta: flush_handlers

# FIREWALL

- ansible.builtin.import_role:
    name: "nudgis/shared"
    tasks_from: "firewall_rules_files.yml"
  vars:
    firewall_rules_files: "{{ import_firewall_rules_files }}"

- name: "Flush handlers"
  ansible.builtin.meta: flush_handlers

...
