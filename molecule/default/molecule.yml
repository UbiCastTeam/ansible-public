---

driver:
  name: docker

platforms:
  - name: ms-prep-${CI_PIPELINE_ID:-default}
    image: registry.ubicast.net/docker/debian-systemd:latest
    command: /lib/systemd/systemd
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    tmpfs:
      - /tmp
      - /run
    groups:
      - mediaserver
      - mediaworker
      - mirismanager
      - live
      - celerity
      - postgres
      - mediaimport
      - mediavault
      - netcapture
      - msmonitor
      - munin_server
      - munin_node

provisioner:
  name: ansible
  options:
    D: true
  env:
    ANSIBLE_ROLES_PATH: ../../roles
    ANSIBLE_LIBRARY: ../../library
    ANSIBLE_ACTION_PLUGINS: ../../plugins/action
    ANSIBLE_PYTHON_INTERPRETER: /usr/bin/python3
    SKYREACH_SYSTEM_KEY: ${SKYREACH_SYSTEM_KEY_STD}
  inventory:
    group_vars:
      all:
        customer_short_name: customer


verifier:
  name: testinfra
  options:
    verbose: true


...
