---

- name: "CHECK LIVE SERVERS LIVE CONFIGURATION STATE"
  hosts: live
  gather_facts: false
  tags: live
  tasks:
    - name: "Check the existence of the live configuration"
      ansible.builtin.stat:
        path: "/etc/nginx/rtmp.d/{{ live_app_name }}.conf"
      register: live_conf_live

    - name: "Getting the live configuration content"
      ansible.builtin.shell: "grep -oP '^application \\K[A-Za-z0-9]+' /etc/nginx/rtmp.d/{{ live_app_name }}.conf"
      when: live_conf_live['stat']['exists'] | default(false)
      register: live_conf_secret
      changed_when: false

    - name: "Declare application secret (with fallback)"
      ansible.builtin.set_fact:
        live_secret: "{{ live_conf_secret['stdout'] | default('') }}"


- name: "CHECK FRONTEND SERVERS LIVE CONFIGURATION STATE"
  hosts: front
  gather_facts: false
  tags: live
  tasks:
    - name: "Check the existence of mssettings"
      ansible.builtin.stat:
        path: "/home/{{ live_app_name }}/msinstance/conf/mssettings.py"
      register: ms_settings

    - name: "Extract live secret from mssettings"
      ansible.builtin.command: >
        grep -Po "^LIVE_RTMP_APP\s*=\s*'\K[^']+"
        /home/{{ live_app_name }}/msinstance/conf/mssettings.py
      register: live_secret_result
      changed_when: false
      failed_when: false
      when: ms_settings['stat']['exists'] | default(false)

    - name: "Declare live secret (with fallback)"
      ansible.builtin.set_fact:
        live_secret: "{{ live_secret_result['stdout'] | default('') }}"


- name: "COMPUTE THE APPLICATION SECRET"
  hosts: localhost
  gather_facts: false
  tags: live
  tasks:
    - name: "Retrieving the first live host configured app secret as reference"
      ansible.builtin.set_fact:
        base_live_secret: "{{ hostvars[groups['live'][0]]['live_secret'] | default('') }}"
        app_secret_diff: false

    - name: "Comparing the app secrets from fontend and live servers"
      ansible.builtin.set_fact:
        app_secret_diff: true
      when:
        - base_live_secret != ''
        - hostvars[item]['live_secret'] | default('') != base_live_secret
      loop: "{{ groups['live'] + groups['front'] }}"

    - name: "Generating an application secret on localhost"
      ansible.builtin.shell: >
        set -o pipefail &&
        head /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 30 | head -n 1
      register: generated_secret
      args:
        executable: /bin/bash
      changed_when: false
      when: (base_live_secret == '') or app_secret_diff

    - name: "Deciding the application secret to use"
      ansible.builtin.set_fact:
        live_app_secret: "{{ generated_secret['stdout'] | default(base_live_secret) }}"


- name: "LIVE SERVERS LIVE CONFIGURATION"
  hosts: live
  gather_facts: false
  tags: live
  tasks:
    - name: "Check the existence of the RTMP app"
      ansible.builtin.command:
        cmd: "ubicast-livectl checkuid {{ live_app_name }} {{ hostvars['localhost']['live_app_secret'] }}"
      register: app_status
      changed_when: false
      failed_when: false

    - name: "(Re)create the RTMP app configuration"
      ansible.builtin.command:
        cmd: "ubicast-livectl add {{ live_app_name }} {{ hostvars['localhost']['live_app_secret'] }}"
        creates: "/etc/nginx/rtmp.d/{{ live_app_name }}.conf"
      when: app_status['rc'] == 1
      notify:
        - "Reload nginx"
        - "Configure and restart munin-node"

    - name: "Prepare the nginx RTMP temporary directory"
      ansible.builtin.file:
        path: "/var/tmp/nginx-rtmp/{{ live_app_name }}"
        owner: nginx
        group: root
        state: directory
        mode: "0700"
      notify: "Reload nginx"

    - name: "Create the nginx RTMP web directory symlink"
      ansible.builtin.file:
        src: "/var/tmp/nginx-rtmp/{{ live_app_name }}"
        dest: "/var/www/{{ live_app_name }}/streaming-rtmp"
        state: link
        force: true
      when: deploy_case | default('standard') == "standard"
      notify: "Reload nginx"

  handlers:
    - name: "Reload nginx"
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    # Order here is important
    - name: "Gather the package facts"
      ansible.builtin.package_facts:
        manager: auto
      listen: "Configure and restart munin-node"

    - name: "Setup munin-node plugins link"
      ansible.builtin.shell:
        cmd: "munin-node-configure --shell --remove-also 2>&1 | sh -x"
      register: munin_plugin_linked
      changed_when: munin_plugin_linked['stderr'] | length > 0
      when: "'munin-node' in ansible_facts['packages']"
      listen: "Configure and restart munin-node"

    - name: "Restart munin-node service"
      ansible.builtin.service:
        name: munin-node
        state: restarted
      when: "'munin-node' in ansible_facts['packages']"
      listen: "Configure and restart munin-node"


- name: "FRONTEND SERVERS LIVE CONFIGURATION"
  hosts: front
  gather_facts: false
  tags: live
  tasks:
    - name: "Check the existence of msconf"
      ansible.builtin.stat:
        path: /etc/mediaserver/msconf.py
      register: ms_conf

    - name: "Configure global live configurations into msconf"
      ansible.builtin.lineinfile:
        path: /etc/mediaserver/msconf.py
        regexp: '^#?\s*{{ item.name }}\s*=.*$'
        line: "{{ item.name }} = '{{ item.value }}'"
        create: true
      loop:
        - { name: 'LIVE_RTMP_PLAYBACK_URL', value: '{{ rtmp_hls_url }}' }
        - { name: 'LIVE_RTMP_PUBLISH_URL', value: '{{ rtmp_pub_url }}' }
      when: ms_conf['stat']['exists'] | default(false)
      notify: "Restart mediaserver"

    - name: "Check the existence of mssettings"
      ansible.builtin.stat:
        path: "/home/{{ live_app_name }}/msinstance/conf/mssettings.py"
      register: ms_settings

    - name: "Configure instance live configuration into mssettings"
      ansible.builtin.lineinfile:
        path: "/home/{{ live_app_name }}/msinstance/conf/mssettings.py"
        regexp: '^#?\s*{{ item.name }}\s*=.*$'
        line: "{{ item.name }} = '{{ item.value }}'"
        create: true
      loop:
        - { name: 'LIVE_RTMP_APP', value: "{{ hostvars['localhost']['live_app_secret'] }}" }
        - { name: 'LIVE_PORTAL_NAME', value: "{{ live_app_name }}" }
      when: ms_settings['stat']['exists'] | default(false)
      notify: "Restart mediaserver"

  handlers:
    - name: "Restart mediaserver"
      ansible.builtin.systemd:
        name: mediaserver
        state: restarted

...
