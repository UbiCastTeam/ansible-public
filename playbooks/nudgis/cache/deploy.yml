---

- name: "NUDGIS CACHE"
  hosts: cache
  roles:
    - nudgis/cache
  tasks:
    - name: "Getting the IP to trust in term of securelink"
      ansible.builtin.set_fact:
        securelink_ip: "{{ hostvars[inventory_hostname]['ansible_facts']['default_ipv4']['address'] }}"
      tags: configure

    - name: "Authorize Nudgis Cache on the Nudgis Front(s)"
      notify: "Restart nginx on the nudgis fronts"
      ansible.builtin.lineinfile:
        path: /etc/nginx/conf.d/mediaserver-securelink.conf
        line: "{{ '\t' }}{{ securelink_ip }} 1;"  # noqa jinja[spacing]
        insertafter: ^geo
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['front'] }}"
      when:
        - groups['front'] is defined
        - groups['front'] | length > 0
      tags: configure

    - name: "Warn when Nudgis Front group is empty or missing"
      ansible.builtin.debug:
        msg: "WARNING: No Nudgis Front server found in the 'front' group. Skipping configuration."
      when: >
        groups['front'] is not defined or
        groups['front'] | length == 0
      run_once: true
      tags: configure

  handlers:
    - name: "Restart nginx on the nudgis fronts"
      ansible.builtin.systemd:
        name: nginx
        state: restarted
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['front'] }}"

...
