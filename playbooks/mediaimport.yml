#!/usr/bin/env ansible-playbook
---

- name: MEDIAIMPORT
  hosts: mediaimport
  tags: mediaimport
  roles:
    - mediaimport
  post_tasks:
    - name: configure network
      when: network_apply | d(false)
      include_role:
        name: network
    - name: configure proxy
      when: proxy_apply | d(false)
      include_role:
        name: proxy

...
