#!/usr/bin/env ansible-playbook
---

- name: Munin server
  hosts: munin_server
  tags: munin
  pre_tasks:
    - name: gather munin_node group facts
      ansible.builtin.setup:
      delegate_to: "{{ item }}"
      delegate_facts: true
      with_items: "{{ groups['munin_node'] }}"
  roles:
    - monitor/munin_server

...
